<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Data Assistant - Chatbot for Your Data</title>

    <!-- Bootstrap 4 CSS -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />
    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  </head>
  <body>
    <div class="container d-flex flex-column vh-100">
      <!-- Header Section -->
      <div class="row">
        <div class="col-12" style="margin-top: 2rem">
          <h1 class="text-center mb-3">Personal Data Assistant</h1>
        </div>
        <div class="col-12 text-center">
          <div class="custom-control custom-switch mb-3">
            <input
              type="checkbox"
              class="custom-control-input"
              id="light-dark-mode-switch"
            />
            <label class="custom-control-label" for="light-dark-mode-switch"
              >Toggle light/dark mode</label
            >
          </div>
        </div>
      </div>

      <!-- Chat Window Section -->
      <div class="row flex-grow-1 overflow-auto">
        <div class="col-12 col-md-8 mx-auto d-flex flex-column">
          <div id="chat-window" class="p-3">
            <div id="message-list"></div>
            <!-- Loading animation for user message -->
            <div class="loading-animation my-loading">
              <div class="loading-dots my-loading">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
            <!-- Loading animation for bot response -->
            <div class="loading-animation">
              <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
          </div>

          <!-- Input Area -->
          <div class="input-group mt-1">
            <input
              type="text"
              id="message-input"
              class="form-control"
              placeholder="Type your message here..."
              disabled
            />
            <div class="input-group-append">
              <button id="send-button" class="btn btn-primary send" disabled>
                <i class="fa fa-paper-plane"></i>
              </button>
              <button id="reset-button" class="btn btn-primary reset">
                <i class="fa fa-refresh"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
